
# PasswordGenLocal — Field Documentation
# Config file location: %appdata%\LPG\config.ini
# Format: key=value (no sections, # for comments)
#
# ─────────────────────────────────────────────────────────────────────────────
# theme
#   0 = Follow system (reads AppsUseLightTheme from registry)
#   1 = Light
#   2 = Dark
#
# defaultLength
#   Password length for new generations (7-64 or 128; range 65-127 is invalid)
#
# defaultMode
#   0 = Web/OAuth  — alphanumeric + !#$%&()*+-./:;=?@_~
#   1 = NIX/POSIX  — alphanumeric + !#%+,-./:=@_~
#   2 = Azure AD / Kerberos — full 95 printable ASCII (0x20..0x7E)
#
# defaultCount
#   Number of passwords generated per click (1-128)
#
# trackAndClearGlobal
#   true = clear session output and clipboard on exit
#   false = leave output intact on exit
#
# trackAndClearEverSet
#   Internal flag: true once the user has answered the track-and-clear prompt
#
# clipboardTimeoutSeconds
#   Seconds after which clipboard is auto-cleared (0 = disabled)
#
# askOnGenerate
#   true = prompt to create/select a store on the first generation in session mode
#
# csvExportWarningAccepted
#   true = skip the unencrypted CSV export warning dialog
#
# editableStoreWarningAccepted
#   true = skip the "editing store labels not recommended" warning
# ─────────────────────────────────────────────────────────────────────────────
